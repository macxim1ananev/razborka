spring:
  application:
    name: marketplace
  datasource:
    url: jdbc:postgresql://localhost:5432/marketplace
    username: marketplace
    password: marketplace
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  elasticsearch:
    uris: http://localhost:9200
  cache:
    type: caffeine
    cache-names: listingPreviews,listingDetails,searchResults
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080

app:
  security:
    disabled: ${APP_SECURITY_DISABLED:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me-please-use-long-random-string}
    access-ttl-minutes: 15
    refresh-ttl-days: 30
    cookie:
      enabled: true
      secure: false
      same-site: Lax
  storage:
    local:
      root: ./data/uploads
    public-base-url: http://localhost:8080/files
  media:
    delivery:
      # Публичный origin CDN (без / в конце). Пусто — URL фото как в БД.
      public-base-url: ${MEDIA_DELIVERY_PUBLIC_BASE_URL:}
      # Старые префиксы photo_url, которые заменяются на public-base-url (порядок важен).
      rewrite-source-prefixes:
        - ${MEDIA_DELIVERY_REWRITE_PREFIX:${app.storage.public-base-url}}
  datasource:
    write:
      url: ${APP_DS_WRITE_URL:${spring.datasource.url}}
      username: ${APP_DS_WRITE_USERNAME:${spring.datasource.username}}
      password: ${APP_DS_WRITE_PASSWORD:${spring.datasource.password}}
      max-pool-size: ${APP_DS_WRITE_MAX_POOL_SIZE:25}
      min-idle: ${APP_DS_WRITE_MIN_IDLE:5}
    read:
      url: ${APP_DS_READ_URL:${app.datasource.write.url}}
      username: ${APP_DS_READ_USERNAME:${app.datasource.write.username}}
      password: ${APP_DS_READ_PASSWORD:${app.datasource.write.password}}
      max-pool-size: ${APP_DS_READ_MAX_POOL_SIZE:30}
      min-idle: ${APP_DS_READ_MIN_IDLE:5}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    ru.razborka.marketplace: INFO
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: marketplace
